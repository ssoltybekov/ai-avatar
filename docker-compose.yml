# docker-compose.yml
version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.7.4  
    container_name: avatar_qdrant
    ports:
      - "6333:6333"   
      - "6334:6334"   
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: avatar_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  qdrant_storage:
  ollama_models: